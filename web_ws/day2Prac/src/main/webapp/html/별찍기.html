
<!-- 1단계. html파일 - view 화면 
	  : 사용자에게 입력을 받고, 결과를 보여줄 틀을 제공
	  
	  서블릿 코드 안에 out.printn으로 작성하던 html 태그들을 들어내어 별도의 .html파일로 만든다.
	  -->

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>

<!-- 
<a href="/day2Prac/star1">별찍기</a>
 ㄴ 이렇게 적게 되면 서블릿(서버)입장에서는 "별찍기 버튼을 눌렀다"는 건 알지만 "별을 몇 개 
 찍어야 하는지(cnt)"정보는 전달받지 못함
 -->
<!-- 사용자가 직접 숫자를 입력하게 하고 싶다면 from태그와 input 사용하기-->
<form action="/day2Prac/star1" method="get">
	<input type="number" name="cnt" placeholder="별 개수를 입력하세요">
	<button type="submit">별찍기 시작</button>
</form>
</body>
</html>
