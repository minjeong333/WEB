<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.0/jquery.min.js"></script>

<script>
function getData(){
	//alert("df");
	
	$.ajax({
		type:"get",
		url:"/day06Prac/food3",
		success: function(  data){
			console.log(data);
			//
			/*
			let str="<ul>";
			
			for(let i=0; i<data.length; i++){
				let item = data[i];
				console.log(item);
				
				str+="<li>"+ item.name + item.price +"</li>";
			}
			str += "</ul>"
			*/
			
			//foreach문
			let str="<ul>";  //let str=`<ul>`;
			data.forEach(function(item) {
			    console.log(item); //1번으로 확인
			    str += `<li>${item.name} :
			    		${item.price}</li>`; //백틱은 enter키 적용 가능
			});
			
			str += "</ul>" //str += `</ul>`
			
			//
			$("#result").html(str);
			
		},
		error: function(err){
			console.log(err);
		}
	});
	
}

//

</script>
</head>
<body>

<button onclick="getData()">메뉴추천하기</button>


<div id="result"> 처음자리 </div>
</body>
</html>
