<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.0/jquery.min.js"></script>

<script>
function regData(){
	//{"name":"모둠스시", "price":20000} 
	// => request로부터 직접 바디 읽기  
	//	  JSONObject 객체로 만들기 
	// 	  Food 객체
	//							  => @RequestBody(스프링에서)
	//alert("hihi");
	
	//객체 만들고 콘솔에 찍기
	let newFood= { name:"모둠스시", price:20000};
	console.log(newFood);
	
	//문자열로 변경 = json변환하기
	let newFoodStr = JSON.stringify(newFood);
	console.log(newFoodStr);
	
	$.ajax({
		type:"post",
		url:"/day06Prac/foodReg",
		contentType:"applicaiton/json",
		data: newFoodStr,
		success: function(data){
			console.log(data);
		},
		error: function(err){
			console.log(err);
		}
	});
	
	
}
</script>
</head>
<body>

<button onclick="regData()">메뉴등록하기</button>
</body>
</html>
