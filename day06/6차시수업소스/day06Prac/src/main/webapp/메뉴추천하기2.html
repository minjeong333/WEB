<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style>
	span{
		color:blue;
	}
</style>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.0/jquery.min.js"></script>

<script>
function getData(){
	//alert("adad");
	
	//$.ajax();
	$.ajax({
		type:"get",
		url:"/day06Prac/food2",
		success:function(data){
			console.log(data);
			
			//$("#result").html("<p>" + data.name + data.price + "</p>");
			let resultData=`<p> <span>${data.name}  </span> <span> ${data.price} </span> </p>`;
			$("#result").html(resultData);
		},
		error:function(err){
			console.log(err);
		}
	});
}

</script>


</head>
<body>

<button onclick="getData()">메뉴 추천하기</button>

<h2></h2>
<div id="result">
		1111
		
</div>


</body>
</html>
